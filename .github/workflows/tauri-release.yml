name: Tauri Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'tauri-v*'

permissions:
  contents: write

jobs:
  release-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Validate Tauri shell
        run: npm run tauri:validate

      - name: Publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TASTEDIVE_API_KEY: ${{ secrets.VITE_TASTEDIVE_API_KEY }}
          VITE_OMDB_API_KEY: ${{ secrets.VITE_OMDB_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Plus Ultra Tauri ${{ github.ref_name }}
          releaseBody: Tauri desktop build with signed updater artifacts.
          releaseDraft: false
          prerelease: false
